spring.application.name=mate

# ── 데이터베이스 ──────────────────────────────────────────────────────────────
# 운영 환경에서는 반드시 환경변수로 주입 (로컬 개발 시 기본값 사용)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/mate?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true}
spring.datasource.username=${DB_USERNAME:mate_user}
spring.datasource.password=${DB_PASSWORD:mate1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA 공통 ─────────────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.format_sql=true

# ── 스케줄러 ─────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=5

# ── JWT ──────────────────────────────────────────────────────────────────────
# 운영 환경에서는 반드시 환경변수로 주입
jwt.secret=${JWT_SECRET:mate-secret-key-must-be-at-least-32-characters-long}
jwt.expire-ms=${JWT_EXPIRE_MS:86400000}

# ── 활성 프로파일 (기본: dev) ─────────────────────────────────────────────────
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
